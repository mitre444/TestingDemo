name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest flake8 bandit safety detect-secrets

      - name: Lint
        run: flake8 src/ tests/ || true

      - name: Security scan
        run: bandit -r src/ || true

      - name: Dependency scan
        run: safety scan -r requirements.txt || true

      - name: Secrets scan
        run: detect-secrets-hook --baseline .secrets.baseline || true

      - name: Test
        run: pytest tests/ -v